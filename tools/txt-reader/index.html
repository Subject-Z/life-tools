<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>TXT电子书阅读器 — 生活工具箱</title>
  <link rel="stylesheet" href="../../styles/main.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="page-main">
  <div class="container">
    <div class="breadcrumb">
      <a href="../../index.html">首页</a>
      <span class="sep">/</span>
      <span class="current">TXT电子书阅读器</span>
    </div>

    <div id="bookshelfView" class="bookshelf-view">
      <div class="bookshelf-header">
        <h2 class="bookshelf-title">我的书架</h2>
        <div class="bookshelf-actions">
          <button id="addBookBtn" class="add-book-btn">
            <svg xmlns="http://www.w3.org/200/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            添加电子书
          </button>
          <input type="file" id="fileInput" class="file-input" accept=".txt" multiple>
        </div>
      </div>
      <div id="bookList" class="book-list"></div>
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">📚</div>
        <p>书架空空如也，点击上方按钮添加电子书吧</p>
      </div>
    </div>

    <div id="readerContainer" class="reader-container" style="display: none;">
      <div class="content-wrapper">
        <div class="content-panel">
          <div id="sidebar" class="sidebar hidden">
            <div class="sidebar-header">
              <div class="sidebar-title">
                <svg xmlns="http://www.w3.org/200/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
                章节目录
              </div>
              <div class="sidebar-actions">
                <button id="closeSidebar" class="toggle-btn" style="padding: 0.4rem 0.6rem; font-size: 0.75rem;">
                  <svg xmlns="http://www.w3.org/200/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                  </svg>
                </button>
              </div>
            </div>
            <div id="chapterList" class="chapter-list"></div>
          </div>
          <div id="contentTitle" class="content-title">选择章节开始阅读</div>
          <div id="contentBody" class="content-body"></div>
          <div id="chapterControls" class="chapter-controls">
            <button id="prevChapter" class="chapter-btn" disabled>
              <svg xmlns="http://www.w3.org/200/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/>
                <polyline points="12 19 5 12 12 5"/>
              </svg>
              上一章
            </button>
            <span id="chapterInfo" class="chapter-info"></span>
            <button id="nextChapter" class="chapter-btn" disabled>
              下一章
              <svg xmlns="http://www.w3.org/200/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div id="fixedButtons" class="fixed-buttons">
          <button id="backToBookshelf" class="toggle-btn fixed-btn">
            <svg xmlns="http://www.w3.org/200/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
            书架
          </button>
          <button id="toggleSidebar" class="toggle-btn fixed-btn">
            <svg xmlns="http://www.w3.org/200/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
            目录
          </button>
          <button id="openSettings" class="toggle-btn fixed-btn">
            <svg xmlns="http://www.w3.org/200/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"/>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
            </svg>
            设置
          </button>
        </div>
      </div>
    </div>
    
    <div id="settingsPanel" class="settings-panel hidden">
      <div class="settings-header">
        <div class="settings-title">阅读设置</div>
        <button id="closeSettings" class="settings-close">
          <svg xmlns="http://www.w3.org/200/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="settings-content">
        <div class="setting-item">
          <div class="setting-label">
            <span>字体大小</span>
          </div>
          <div class="font-size-controls">
            <button id="fontSizeDecrease" class="font-size-btn">&minus;</button>
            <span id="fontSizeValue" class="font-size-value">16</span>
            <button id="fontSizeIncrease" class="font-size-btn">+</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</main>

<footer>
  <p>生活工具箱 &copy; 2026 — 简约实用的在线工具集合</p>
  <p><a href="https://github.com/Subject-Z/life-tools" target="_blank" rel="noopener noreferrer">反馈与建议</a></p>
</footer>

<script type="module" src="script.js"></script>

</body>
</html>
