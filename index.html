<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生活工具箱 — 实用在线工具集</title>
  <link rel="stylesheet" href="styles/main.css">
  <style>
    .hero {
      padding: 4rem 0 2.5rem;
    }

    .tools-section {
      padding-bottom: 2rem;
    }

    .tools-section h2 {
      text-align: center;
      margin-bottom: 2rem;
      color: var(--text-secondary);
      font-weight: 400;
      font-style: italic;
    }
  </style>
</head>
<body>

<main class="page-main">
  <div class="container">
    <div class="hero section-header">
      <h1>精选工具 化繁为简</h1>
      <p>简约、高效、即开即用的在线工具集合，让日常任务变得轻松优雅。</p>
    </div>

    <section class="tools-section">
      <div id="toolGrid" class="tool-grid">
      </div>
    </section>
  </div>
</main>

<footer>
  <p>生活工具箱 &copy; 2026 — 简约实用的在线工具集合</p>
</footer>

<script src="config/tools.js"></script>
<script src="scripts/core.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    LifeTools.Core.renderToolGrid('toolGrid');
  });
</script>

</body>
</html>
